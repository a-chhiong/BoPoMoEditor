<!DOCTYPE html>
<html lang="zh-hant-TW">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>〇〇日報 注音與漢字工具箱 | BoPoMo Typography IDE</title>
    <meta name="description" content="基於美學與設計的注音排版工具與 Unicode IVS 探索器。支援多音字智慧判定、即時編輯標註、CSS 旁註渲染與 Unicode 變體字形。">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">

    <!-- Import Map: resolves bare module specifiers when served raw (non-Vite).
         Vite bundles everything at build time and ignores this entirely. -->
    <script type="importmap">
    {
      "imports": {
        "xlsx": "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mjs"
      }
    }
    </script>

    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="./src/style.css">
</head>

<body class="light-theme">
    <script>
        (function () {
            const savedTheme = localStorage.getItem('bopomo-theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.remove('light-theme');
                document.body.classList.add('dark-theme');
            }
        })();
    </script>

    <bopomo-editor-app></bopomo-editor-app>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
